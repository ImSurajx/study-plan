<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suraj's Master Study Schedule</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="sync-status">Saving to Google Sheets...</div>

    <div class="wrap">
      <div class="top-controls">
        <div class="phase-toggle">
          <button
            class="toggle-btn active"
            id="btn-p1"
            onclick="switchPhase('p1')"
          >
            Phase 1: May 15–Jun 7
          </button>
          <button class="toggle-btn" id="btn-p2" onclick="switchPhase('p2')">
            Phase 2: Jun 16–Jun 23
          </button>
          <button class="toggle-btn" id="btn-p3" onclick="switchPhase('p3')">
            Phase 3: Jun 28–30
          </button>
        </div>

        <div class="bulk-actions mount-anim">
          <button
            class="bulk-btn complete-all"
            onclick="bulkUpdateVisible('Completed')"
          >
            ✓ Complete Visible
          </button>
          <button
            class="bulk-btn clear-all"
            onclick="bulkUpdateVisible('Pending')"
          >
            ✕ Clear Visible
          </button>
        </div>
      </div>

      <div style="margin-bottom: 16px">
        <div
          id="app-header"
          class="mount-anim"
          style="animation-delay: 0s"
        ></div>
      </div>

      <div
        id="app-stats"
        class="stats-row mount-anim"
        style="animation-delay: 0.1s"
      ></div>

      <div
        class="tabs-legend-container mount-anim"
        style="animation-delay: 0.15s"
        id="sticky-nav"
      >
        <div id="app-legend" class="legend"></div>
        <div id="app-tabs" class="tabs"></div>
      </div>

      <div id="schedule"></div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
